<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERN — Kartenshop</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0b07;--surface:#1a1510;--surface2:#241d14;--border:#3a2f1e;
    --gold:#c9923a;--gold-dim:#7a5520;--gold-glow:#e8b060;
    --text:#e8dcc8;--text-dim:#8a7a60;--text-muted:#504030;--radius:6px;
    --col-holz:#8faa5a;--col-eisen:#7a9bb5;--col-nahrung:#c9a83a;
    --col-stein:#9a8a7a;--col-geld:#c9923a;--col-flex:#a07ab5;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* HEADER */
  header{background:linear-gradient(180deg,#1a1208 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:.7rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:700;color:var(--gold);letter-spacing:.15em;text-shadow:0 0 20px rgba(201,146,58,.4);flex-shrink:0;}
  .logo span{color:var(--text-dim);font-weight:400;font-size:.62rem;letter-spacing:.3em;display:block;margin-top:-2px;}
  .search-wrap{flex:1;max-width:280px;margin-left:auto;position:relative;}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.4rem .9rem .4rem 1.9rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;}
  .search-wrap input:focus{border-color:var(--gold-dim);}
  .search-wrap input::placeholder{color:var(--text-muted);}
  .search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:.82rem;}
  .card-count{color:var(--text-dim);font-size:.72rem;white-space:nowrap;}

  /* TYPE TABS */
  .type-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:.38rem .9rem;display:flex;align-items:center;gap:.28rem;flex-wrap:wrap;}
  .type-tab{padding:.22rem .6rem;border-radius:4px;font-size:.68rem;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;}
  .type-tab:hover{border-color:var(--gold-dim);color:var(--text);}
  .type-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-glow);}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:215px 1fr;min-height:calc(100vh - 83px);}

  /* SIDEBAR */
  aside{background:var(--surface);border-right:1px solid var(--border);padding:.85rem;position:sticky;top:83px;height:calc(100vh - 83px);overflow-y:auto;display:flex;flex-direction:column;}
  aside::-webkit-scrollbar{width:3px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .filter-section{margin-bottom:.8rem;}
  .filter-label{font-family:'Cinzel',serif;font-size:.54rem;font-weight:600;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.35rem;display:block;}
  .filter-chips{display:flex;flex-wrap:wrap;gap:.22rem;}
  .chip{padding:.22rem .5rem;border-radius:4px;font-size:.65rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:.2rem;}
  .chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .chip.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-glow);}
  .chip img{width:11px;height:11px;object-fit:contain;}

  /* BUY PANEL */
  .buy-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem;margin-bottom:.8rem;}
  .buy-rows{display:flex;flex-direction:column;gap:.26rem;margin-bottom:.38rem;}
  .buy-row{display:flex;align-items:center;gap:.4rem;}
  .buy-label{display:flex;align-items:center;gap:.25rem;font-size:.64rem;color:var(--text-dim);width:78px;flex-shrink:0;}
  .buy-label img{width:13px;height:13px;object-fit:contain;}
  .stepper{display:flex;align-items:center;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex:1;}
  .stepper-btn{background:var(--surface);border:none;color:var(--text-dim);font-size:.95rem;width:26px;height:24px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600;}
  .stepper-btn:hover{background:var(--gold-dim);color:var(--gold-glow);}
  .stepper-val{flex:1;background:var(--bg);color:var(--text);font-size:.78rem;font-weight:600;text-align:center;height:24px;line-height:24px;font-family:'Cinzel',serif;}
  .buy-toggle{width:100%;padding:.3rem;background:var(--gold-dim);border:1px solid var(--gold);border-radius:4px;color:var(--gold-glow);font-size:.67rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:center;}
  .buy-toggle:hover{background:var(--gold);color:#000;}
  .buy-toggle.active{background:var(--gold);color:#000;font-weight:600;}
  .buy-clear{width:100%;padding:.2rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-size:.62rem;cursor:pointer;font-family:'Inter',sans-serif;margin-top:.25rem;}
  .buy-clear:hover{border-color:var(--gold-dim);color:var(--text-dim);}
  .buy-note{font-size:.56rem;color:var(--text-muted);text-align:center;margin-top:.22rem;font-style:italic;}

  .reset-btn{width:100%;padding:.38rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:.65rem;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;margin-top:auto;}
  .reset-btn:hover{border-color:var(--gold-dim);color:var(--text-dim);}

  /* SORT BAR */
  .sort-bar{display:flex;align-items:center;gap:.28rem;padding:.42rem .85rem;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
  .sort-label{font-size:.65rem;color:var(--text-muted);}
  .sort-btn{padding:.2rem .52rem;border-radius:4px;font-size:.65rem;border:1px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:.15rem;}
  .sort-btn:hover{color:var(--text);}
  .sort-btn.active{border-color:var(--border);background:var(--surface2);color:var(--gold);}
  .sort-arrow{font-size:.56rem;opacity:.7;}

  /* MAIN */
  main{display:flex;flex-direction:column;}
  .grid-area{padding:.85rem;flex:1;}

  /* CARD GRID — responsive */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.8rem;}

  /* CARD — aspect ratio based, no fixed height */
  .card-wrap{cursor:pointer;position:relative;}
  /* 3:4 aspect ratio card */
  .card-aspect{width:100%;padding-top:133%;position:relative;}
  .card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1);border-radius:var(--radius);}
  /* Desktop: hover flips */
  @media(hover:hover){
    .card-wrap:hover .card-inner{transform:rotateY(180deg);}
  }
  /* Tap-to-flip on touch */
  .card-wrap.flipped .card-inner{transform:rotateY(180deg);}

  .card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);overflow:hidden;}
  .card-front{border:1px solid var(--border);}
  .card-back{transform:rotateY(180deg);background:var(--surface);border:1px solid var(--gold-dim);display:flex;flex-direction:column;padding:.6rem;}

  /* FRONT = bild only */
  .card-art{width:100%;height:100%;position:relative;}
  .card-art img.artwork{width:100%;height:100%;object-fit:cover;object-position:top;display:block;border-radius:calc(var(--radius) - 1px);}
  .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;font-size:1.8rem;opacity:.2;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);}
  .ph-label{font-family:'Cinzel',serif;font-size:.5rem;opacity:.6;}

  /* BACK */
  .back-name{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;color:var(--gold);margin-bottom:.12rem;border-bottom:1px solid var(--border);padding-bottom:.22rem;flex-shrink:0;}
  .back-typeline{font-size:.53rem;color:var(--text-muted);margin-bottom:.28rem;flex-shrink:0;line-height:1.3;}
  .back-stats{display:flex;gap:.35rem;margin-bottom:.28rem;flex-shrink:0;}
  .back-stat{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:.12rem .35rem;font-size:.58rem;display:flex;align-items:center;gap:.18rem;font-family:'Cinzel',serif;}
  .back-stat span{color:var(--text-muted);font-size:.5rem;font-family:'Inter',sans-serif;}
  .back-text{font-size:.59rem;color:var(--text-dim);line-height:1.52;flex:1;overflow-y:auto;min-height:0;}
  .back-text::-webkit-scrollbar{width:2px;}
  .back-text::-webkit-scrollbar-thumb{background:var(--border);}
  .back-divider{color:var(--border);font-size:.4rem;display:block;text-align:center;margin:.13rem 0;}
  .tok img{width:11px;height:11px;object-fit:contain;vertical-align:middle;}
  .back-costs{margin-top:.25rem;padding-top:.22rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:2px;flex-shrink:0;}
  .cost-pill{font-size:.49rem;font-weight:600;padding:1px 3px;border-radius:3px;line-height:1.4;display:inline-flex;align-items:center;gap:2px;}
  .cost-pill img{width:9px;height:9px;object-fit:contain;}
  .pill-geld   {background:rgba(201,146,58,.2); color:var(--col-geld);   border:1px solid rgba(201,146,58,.35);}
  .pill-eisen  {background:rgba(122,155,181,.2);color:var(--col-eisen);  border:1px solid rgba(122,155,181,.35);}
  .pill-holz   {background:rgba(143,170,90,.2); color:var(--col-holz);   border:1px solid rgba(143,170,90,.35);}
  .pill-nahrung{background:rgba(201,168,58,.2); color:var(--col-nahrung);border:1px solid rgba(201,168,58,.35);}
  .pill-stein  {background:rgba(154,138,122,.2);color:var(--col-stein);  border:1px solid rgba(154,138,122,.35);}
  .pill-flex   {background:rgba(160,122,181,.2);color:var(--col-flex);   border:1px solid rgba(160,122,181,.35);}
  .back-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.22rem;padding-top:.22rem;border-top:1px solid var(--border);flex-shrink:0;}
  .back-wert{font-size:.56rem;color:var(--gold);font-family:'Cinzel',serif;}

  /* KEYWORD highlight in text */
  .kw{color:var(--gold-glow);border-bottom:1px dotted var(--gold-dim);cursor:pointer;font-weight:500;}
  .kw:hover{color:var(--gold);border-color:var(--gold);}

  /* KEYWORD POPUP */
  .kw-popup{position:fixed;z-index:500;background:var(--surface);border:1px solid var(--gold-dim);border-radius:var(--radius);padding:.7rem .85rem;max-width:240px;box-shadow:0 8px 24px rgba(0,0,0,.6);pointer-events:none;opacity:0;transition:opacity .15s;}
  .kw-popup.visible{opacity:1;pointer-events:auto;}
  .kw-popup-name{font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;color:var(--gold);margin-bottom:.3rem;border-bottom:1px solid var(--border);padding-bottom:.22rem;}
  .kw-popup-text{font-size:.64rem;color:var(--text-dim);line-height:1.55;white-space:pre-line;}

  /* STATUS */
  .status{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text-muted);}
  .status-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.25;}
  .status-text{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.1em;}
  .status small{display:block;margin-top:.5rem;font-family:'Inter',sans-serif;font-size:.7rem;letter-spacing:0;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .8rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* MOBILE */
  @media(max-width:640px){
    .layout{grid-template-columns:1fr;}
    aside{position:static;height:auto;max-height:260px;border-right:none;border-bottom:1px solid var(--border);}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.55rem;}
    .search-wrap{max-width:150px;}
    .logo span{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">KERN<span>Kartenshop</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Karte suchen…" oninput="applyFilters()">
  </div>
  <div class="card-count" id="cardCount">Lädt…</div>
</header>

<div class="type-bar" id="typeBar"></div>

<div class="layout">
<aside>
  <div class="buy-panel">
    <span class="filter-label">💰 Was kann ich kaufen?</span>
    <div class="buy-rows" id="buyRows"></div>
    <button class="buy-toggle" id="buyToggle" onclick="toggleBuyMode()">Filter aktivieren</button>
    <button class="buy-clear" onclick="clearBuy()">Zurücksetzen</button>
    <div class="buy-note">Ereigniskarten sind nicht kaufbar</div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Subtyp</span>
    <div class="filter-chips" id="filterSubtyp"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Gebiet</span>
    <div class="filter-chips" id="filterGebiet"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Spielstein</span>
    <div class="filter-chips" id="filterSpielstein"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Kosten (enthält)</span>
    <div class="filter-chips" id="filterKosten"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Wert</span>
    <div class="filter-chips" id="filterWert"></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">✕ Alle Filter zurücksetzen</button>
</aside>

<main>
  <div class="sort-bar">
    <span class="sort-label">Sortierung:</span>
    <button class="sort-btn active" data-sort="name" onclick="setSort(this)"><span>Name</span><span class="sort-arrow" id="arr-name">↑</span></button>
    <button class="sort-btn" data-sort="wert"  onclick="setSort(this)"><span>Wert</span><span class="sort-arrow" id="arr-wert"></span></button>
    <button class="sort-btn" data-sort="cost"  onclick="setSort(this)"><span>Kosten</span><span class="sort-arrow" id="arr-cost"></span></button>
    <button class="sort-btn" data-sort="type"  onclick="setSort(this)"><span>Typ</span><span class="sort-arrow" id="arr-type"></span></button>
  </div>
  <div class="grid-area">
    <div class="card-grid" id="cardGrid">
      <div class="status"><div class="spinner"></div><div class="status-text">Karten werden geladen…</div></div>
    </div>
  </div>
</main>
</div>

<!-- KEYWORD POPUP -->
<div class="kw-popup" id="kwPopup">
  <div class="kw-popup-name" id="kwName"></div>
  <div class="kw-popup-text" id="kwText"></div>
</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────────────
const BASE      = "https://dersatansbraten97.github.io/MyCardgameImages/";
const ICON_BASE = BASE + "Icons/";
const CSV_BASE  = BASE + "CSV/";

const IMAGE_FOLDERS = {
  "Gebäude":    BASE + "Gebäudekarten_Images/",
  "Einheit":    BASE + "Einheitenkarten_Images/",
  "Aktion":     BASE + "Aktionskarten_Images/",
  "Ressource":  BASE + "Ressourcenkarten_Images/",
  "Ereignis":   BASE + "Ereigniskarten_Images/",
  "Spielstein": BASE + "Spielsteine_Images/",
};

const CSV_FILES = [
  {file:"Gebäudekarten - Tabellenblatt1.csv",    typ:"Gebäude",    costCol:"Costs",  hasCost:true },
  {file:"Einheitenkarten - Tabellenblatt1.csv",  typ:"Einheit",    costCol:"Kosten", hasCost:true },
  {file:"Aktionskarten - Tabellenblatt1.csv",    typ:"Aktion",     costCol:"Costs",  hasCost:true },
  {file:"Ressourcenkarten - Tabellenblatt1.csv", typ:"Ressource",  costCol:"Costs",  hasCost:true },
  {file:"Ereigniskarten - Tabellenblatt1.csv",   typ:"Ereignis",   costCol:null,     hasCost:false},
  {file:"Spielsteine - Tabellenblatt1.csv",      typ:"Spielstein", costCol:"Costs",  hasCost:true },
];

const COST_DEF = {
  GeldCost:   {label:"Geld",   cls:"pill-geld",   res:"geld"},
  EisenCost:  {label:"Eisen",  cls:"pill-eisen",  res:"eisen"},
  HolzCost:   {label:"Holz",   cls:"pill-holz",   res:"holz"},
  NahrungCost:{label:"Nahrung",cls:"pill-nahrung",res:"nahrung"},
  SteinCost:  {label:"Stein",  cls:"pill-stein",  res:"stein"},
  FlexCost:   {label:"Flex",   cls:"pill-flex",   res:"flex"},
};

const TEXT_TOKENS = [
  "Activated","Trigger","Unterbrechung","Rohstoff",
  "Geld","Eisen","Holz","Nahrung","Stein","Flex",
  "GeldCost","EisenCost","HolzCost","NahrungCost","SteinCost","FlexCost"
];

const BUY_RES = [
  {id:"geld",   label:"Geld",   token:"Geld"},
  {id:"holz",   label:"Holz",   token:"Holz"},
  {id:"eisen",  label:"Eisen",  token:"Eisen"},
  {id:"nahrung",label:"Nahrung",token:"Nahrung"},
  {id:"stein",  label:"Stein",  token:"Stein"},
];

const TYPE_ICONS = {
  "Gebäude":"🏰","Einheit":"⚔️","Aktion":"🃏",
  "Ressource":"💎","Ereignis":"🎲","Spielstein":"🔷"
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let ALL_CARDS=[], KEYWORDS={};
let activeTypTab="Alle";
let activeSubtyp=new Set(),activeGebiet=new Set(),activeSpielstein=new Set();
let activeKosten=new Set(),activeWert=new Set();
let currentSort="name",sortAsc=true,buyModeActive=false;
const buyVals={geld:0,holz:0,eisen:0,nahrung:0,stein:0};

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.onload=()=>{buildBuyRows();loadAll();};

// ── ICON HELPERS ──────────────────────────────────────────────────────────────
function iconUrl(tok){return ICON_BASE+encodeURIComponent('{'+tok+'}')+ '.png';}
function iconImg(tok,size=12){return `<img src="${iconUrl(tok)}" width="${size}" height="${size}" style="object-fit:contain;vertical-align:middle" alt="${tok}" onerror="this.style.display='none'">`;}

// ── BUY STEPPER ───────────────────────────────────────────────────────────────
function buildBuyRows(){
  document.getElementById('buyRows').innerHTML=BUY_RES.map(r=>`
    <div class="buy-row">
      <div class="buy-label">${iconImg(r.token,13)}<span>${r.label}</span></div>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepBuy('${r.id}',-1)">−</button>
        <div class="stepper-val" id="buyval-${r.id}">0</div>
        <button class="stepper-btn" onclick="stepBuy('${r.id}',1)">+</button>
      </div>
    </div>`).join('');
}
function stepBuy(id,d){
  buyVals[id]=Math.max(0,(buyVals[id]||0)+d);
  document.getElementById('buyval-'+id).textContent=buyVals[id];
  if(buyModeActive)applyFilters();
}
function clearBuy(){
  BUY_RES.forEach(r=>{buyVals[r.id]=0;const e=document.getElementById('buyval-'+r.id);if(e)e.textContent='0';});
  if(buyModeActive){buyModeActive=false;syncBuyBtn();}
  applyFilters();
}
function syncBuyBtn(){
  const b=document.getElementById('buyToggle');
  b.classList.toggle('active',buyModeActive);
  b.textContent=buyModeActive?'Filter aktiv ✓':'Filter aktivieren';
}
function toggleBuyMode(){buyModeActive=!buyModeActive;syncBuyBtn();applyFilters();}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
async function loadAll(){
  const [cards,kw]=await Promise.all([loadAllCSVs(),loadKeywords()]);
  KEYWORDS=kw;
  buildKwStems();
  _kwPattern=buildKwPattern(); // build pattern string once after stems are ready
  buildTypTabs();buildFilters();applyFilters();
}

async function loadKeywords(){
  try{
    const res=await fetch(CSV_BASE+encodeURIComponent('Keywords - Tabellenblatt1.csv'));
    if(!res.ok)return{};
    const text=await res.text();
    const rows=splitCSVRows(text).slice(1);
    const kw={};
    rows.forEach(row=>{
      const [k,v]=parseCSVLine(row).map(x=>x.replace(/^"|"$/g,'').trim());
      if(k)kw[k]=v||'';
    });
    return kw;
  }catch{return{};}
}

async function loadAllCSVs(){
  document.getElementById('cardGrid').innerHTML='<div class="status"><div class="spinner"></div><div class="status-text">Karten werden geladen…</div></div>';
  const results=await Promise.allSettled(CSV_FILES.map(async def=>{
    const res=await fetch(CSV_BASE+encodeURIComponent(def.file));
    if(!res.ok)throw new Error(def.file+': HTTP '+res.status);
    return parseCSV(await res.text(),def);
  }));
  ALL_CARDS=[];
  results.forEach((r,i)=>{
    if(r.status==='fulfilled')ALL_CARDS.push(...r.value);
    else console.warn('CSV Fehler:',CSV_FILES[i].file,r.reason?.message);
  });
  if(!ALL_CARDS.length){
    document.getElementById('cardGrid').innerHTML='<div class="status"><div class="status-icon">⚠️</div><div class="status-text">Keine Karten geladen<small>Prüfe ob CSV-Dateien im Ordner /CSV/ liegen</small></div></div>';
  }
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSVLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){res.push(cur);cur='';}
    else cur+=c;
  }
  res.push(cur);return res;
}
function splitCSVRows(text){
  const rows=[];let cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;cur+=c;}
    else if((c==='\r'||c==='\n')&&!inQ){
      if(c==='\r'&&text[i+1]==='\n')i++;
      if(cur.trim())rows.push(cur);cur='';
    }else cur+=c;
  }
  if(cur.trim())rows.push(cur);return rows;
}
function parseCosts(raw){
  if(!raw)return[];
  const costs=[],mp=new Set();let m;
  const mre=/(\d+)\{(\w+Cost)\}/g;
  while((m=mre.exec(raw))!==null){for(let n=0;n<parseInt(m[1]);n++)costs.push(m[2]);for(let p=m.index;p<m.index+m[0].length;p++)mp.add(p);}
  const sre=/\{(\w+Cost)\}/g;
  while((m=sre.exec(raw))!==null){if(!mp.has(m.index))costs.push(m[1]);}
  return costs;
}

// Spielstein aus Typbox: "Einheit - Infanterie - 2 Fußsoldaten" → "Fußsoldat"
// Normalisiert Plural einfach durch Suffix-Mapping
function extractSpielstein(typeStr){
  const parts=typeStr.split(' - ');
  if(parts.length<3)return'';
  let raw=parts[2].trim().replace(/^\d+\s+/,'');
  // Häufige Plural-Suffixe kürzen
  const plurals=[['soldaten','soldat'],['schützen','schütze'],['reiter','Reiter'],['schiffe','Schiff'],['en',''],['n','']];
  const lower=raw.toLowerCase();
  for(const [suf,rep] of plurals){
    if(lower.endsWith(suf)&&lower.length>suf.length+2){
      raw=raw.slice(0,raw.length-suf.length)+rep;
      break;
    }
  }
  return raw;
}

function parseCSV(text,def){
  const rows=splitCSVRows(text);
  if(rows.length<2)return[];
  const h=parseCSVLine(rows[0]).map(x=>x.replace(/^"|"$/g,'').trim());
  const col=n=>{const i=h.indexOf(n);return i>=0?i:null;};

  // Only read the columns we actually need
  const iName   = col('Name');
  const iType   = col('Typbox');
  const iCosts  = def.costCol ? col(def.costCol) : null;
  const iText   = col('Textbox');
  const iWert   = col('Wert');
  const iAngriff= col('Angriffskraft');
  const iAbwehr = col('Abwehrkraft');

  if(iName===null)return[];

  return rows.slice(1).map(row=>{
    const r=parseCSVLine(row).map(v=>v.replace(/^"|"$/g,'').trim());
    const name=r[iName]||'';if(!name)return null;
    const typeRaw=iType!==null?r[iType]||'':'';
    const tp=typeRaw.split(' - ').map(p=>p.trim()).filter(Boolean);
    return{
      name,
      typ:def.typ,
      subtyp:tp[1]||'',
      gebiet:tp[2]||'',
      spielstein:def.typ==='Einheit'?extractSpielstein(typeRaw):'',
      costs:iCosts!==null?parseCosts(r[iCosts]):[],
      rawText:(iText!==null?r[iText]||'':'').replace(/\r/g,''),
      wert:parseFloat(iWert!==null?r[iWert]||'0':'0')||0,
      hasCost:def.hasCost,
      angriff:iAngriff!==null?r[iAngriff]||'':'',
      abwehr: iAbwehr!==null?r[iAbwehr]||'':'',
    };
  }).filter(Boolean);
}

// ── TYPE TABS ─────────────────────────────────────────────────────────────────
function buildTypTabs(){
  const typen=['Alle',...new Set(ALL_CARDS.map(c=>c.typ))];
  const bar=document.getElementById('typeBar');bar.innerHTML='';
  typen.forEach(t=>{
    const b=document.createElement('button');
    b.className='type-tab'+(t===activeTypTab?' active':'');
    b.dataset.typ=t;
    b.textContent=t==='Alle'?'Alle':(TYPE_ICONS[t]||'')+' '+t;
    b.onclick=()=>{
      activeTypTab=t;
      document.querySelectorAll('.type-tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      applyFilters();
    };
    bar.appendChild(b);
  });
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters(){
  const uniq=arr=>[...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'de'));
  buildChips('filterSubtyp',   uniq(ALL_CARDS.map(c=>c.subtyp)),     activeSubtyp,    applyFilters);
  buildChips('filterGebiet',   uniq(ALL_CARDS.map(c=>c.gebiet)),     activeGebiet,    applyFilters);
  buildChips('filterSpielstein',uniq(ALL_CARDS.filter(c=>c.spielstein).map(c=>c.spielstein)),activeSpielstein,applyFilters);

  const usedCosts=[...new Set(ALL_CARDS.flatMap(c=>c.costs))].filter(k=>COST_DEF[k]);
  const cf=document.getElementById('filterKosten');cf.innerHTML='';
  usedCosts.forEach(k=>{
    const i=COST_DEF[k];
    const b=document.createElement('button');b.className='chip';b.dataset.key=k;
    b.innerHTML=`${iconImg(k,11)}<span>${i.label}</span>`;
    b.onclick=()=>toggleF(b,activeKosten,k,applyFilters);
    cf.appendChild(b);
  });

  const werts=[...new Set(ALL_CARDS.map(c=>c.wert).filter(v=>v>0))].sort((a,b)=>a-b);
  const wf=document.getElementById('filterWert');wf.innerHTML='';
  werts.forEach(w=>{const b=mkChip(`★ ${w}`);b.dataset.key=w;b.onclick=()=>toggleF(b,activeWert,w,applyFilters);wf.appendChild(b);});
}
function buildChips(id,vals,set,cb){
  const el=document.getElementById(id);el.innerHTML='';
  vals.forEach(v=>{const b=mkChip(v);b.dataset.key=v;b.onclick=()=>toggleF(b,set,v,cb);el.appendChild(b);});
}
function mkChip(l){const b=document.createElement('button');b.className='chip';b.textContent=l;return b;}
function toggleF(btn,set,val,cb){set.has(val)?(set.delete(val),btn.classList.remove('active')):(set.add(val),btn.classList.add('active'));cb();}
function resetAll(){
  activeSubtyp.clear();activeGebiet.clear();activeSpielstein.clear();activeKosten.clear();activeWert.clear();
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  document.getElementById('searchInput').value='';
  activeTypTab='Alle';
  document.querySelectorAll('.type-tab').forEach(b=>b.classList.toggle('active',b.dataset.typ==='Alle'));
  clearBuy();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function setSort(btn){
  const key=btn.dataset.sort;
  if(currentSort===key)sortAsc=!sortAsc;else{currentSort=key;sortAsc=true;}
  document.querySelectorAll('.sort-btn').forEach(b=>{b.classList.remove('active');const a=document.getElementById('arr-'+b.dataset.sort);if(a)a.textContent='';});
  btn.classList.add('active');
  const a=document.getElementById('arr-'+key);if(a)a.textContent=sortAsc?'↑':'↓';
  applyFilters();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function searchMatch(c,q){
  if(!q)return true;const ql=q.toLowerCase();
  if(c.name.toLowerCase().includes(ql))return true;
  if(c.rawText.toLowerCase().replace(/[{}]/g,'').includes(ql))return true;
  if(c.spielstein&&c.spielstein.toLowerCase().includes(ql))return true;
  return false;
}

// ── AFFORD ────────────────────────────────────────────────────────────────────
function canAfford(card){
  if(!card.hasCost)return false;
  let g=buyVals.geld,h=buyVals.holz,e=buyVals.eisen,n=buyVals.nahrung,s=buyVals.stein;
  for(const k of card.costs){
    if(k==='GeldCost'){if(--g<0)return false;}
    else if(k==='HolzCost'){if(--h<0)return false;}
    else if(k==='EisenCost'){if(--e<0)return false;}
    else if(k==='NahrungCost'){if(--n<0)return false;}
    else if(k==='SteinCost'){if(--s<0)return false;}
  }
  return(h+e+n+s)>=card.costs.filter(k=>k==='FlexCost').length;
}

// ── APPLY FILTERS ─────────────────────────────────────────────────────────────
function applyFilters(){
  const q=document.getElementById('searchInput').value.trim();
  let filtered=ALL_CARDS.filter(c=>{
    if(!searchMatch(c,q))return false;
    if(activeTypTab!=='Alle'&&c.typ!==activeTypTab)return false;
    if(activeSubtyp.size&&!activeSubtyp.has(c.subtyp))return false;
    if(activeGebiet.size&&!activeGebiet.has(c.gebiet))return false;
    if(activeSpielstein.size&&!activeSpielstein.has(c.spielstein))return false;
    if(activeKosten.size&&![...activeKosten].some(k=>c.costs.includes(k)))return false;
    if(activeWert.size&&!activeWert.has(c.wert))return false;
    if(buyModeActive&&!canAfford(c))return false;
    return true;
  });
  const dir=sortAsc?1:-1;
  filtered.sort((a,b)=>{
    if(currentSort==='name')return dir*a.name.localeCompare(b.name,'de');
    if(currentSort==='wert')return dir*(a.wert-b.wert);
    if(currentSort==='cost')return dir*(a.costs.length-b.costs.length);
    if(currentSort==='type')return dir*(a.typ.localeCompare(b.typ,'de')||a.subtyp.localeCompare(b.subtyp,'de'));
    return 0;
  });
  document.getElementById('cardCount').textContent=`${filtered.length} / ${ALL_CARDS.length} Karten`;
  renderGrid(filtered);
}

// ── KEYWORD MATCHING ──────────────────────────────────────────────────────────
// For each keyword we compute a minimal stem by stripping the last few characters.
// Then we just do a simple substring search for that stem (case-insensitive).
// "Schildmarke" → stem "Schildmark" → matches "Schildmarke","Schildmarken"
// "Verstärken"  → stem "Verstärk"   → matches "Verstärke","Verstärkt","Verstärken"
// "Netzwerk"    → stem "Netzwerk"   → matches "Netzwerke","Netzwerks"

function computeStem(kw) {
  const w = kw.toLowerCase();
  // Take first 70% of characters, minimum 4, maximum full word
  // This is intentionally aggressive: "Verbrennen"(10) → 7 chars → "verbrenn"
  // "Schildmarke"(11) → 8 chars → "schildma" — too short, so we use min(floor*0.75, len-2)
  const minLen = 4;
  const stemLen = Math.max(minLen, Math.min(w.length - 2, Math.round(w.length * 0.75)));
  return w.slice(0, stemLen);
}

// Pre-compute stems once after keywords load
let KW_STEMS = {}; // keyword → stem

function buildKwStems(){
  KW_STEMS={};
  for(const kw of Object.keys(KEYWORDS)){
    KW_STEMS[kw] = computeStem(kw);
  }
}

// ── FORMAT TEXT ───────────────────────────────────────────────────────────────
// Highlight keywords by scanning word by word — no global regex state issues
function highlightKeywords(text){
  if(!Object.keys(KW_STEMS).length) return text;
  // Split into words + separators, process each word
  // Use a simple split that keeps delimiters
  const parts = text.split(/(\s+|[.,;:!?()\-\/"])/);
  return parts.map(part => {
    if(!part || /^(\s+|[.,;:!?()\-\/"])$/.test(part)) return part;
    // Check if this word starts with any keyword stem
    const lower = part.toLowerCase();
    for(const [kw, stem] of Object.entries(KW_STEMS)){
      if(lower.startsWith(stem)){
        const safe = kw.replace(/'/g,"\\'");
        return `<span class="kw" data-kw="${kw}" onclick="showKw(event,'${safe}');event.stopPropagation()">${part}</span>`;
      }
    }
    return part;
  }).join('');
}

function formatText(raw){
  // Step 1: structural dividers
  let html = raw
    .replace(/\s*\n\/\n\s*/g, '__DIV__')
    .replace(/\s*\/\n\s*/g, '__DIV__')
    .replace(/\n/g, ' ');

  // Step 2: split on {Token} first, process each segment
  const segments = html.split(/(\{[^}]+\})/);
  html = segments.map(seg => {
    if(seg.startsWith('{') && seg.endsWith('}')){
      const tok = seg.slice(1,-1);
      if(TEXT_TOKENS.includes(tok)) return `<span class="tok">${iconImg(tok,12)}</span>`;
      return `<span style="color:var(--text-muted);font-size:.52rem">${seg}</span>`;
    }
    // Plain text segment — replace dividers then highlight keywords
    return seg.replace(/__DIV__/g, '<span class="back-divider">───────</span>')
              .split('__DIV__').map(t => highlightKeywords(t)).join('<span class="back-divider">───────</span>');
  }).join('');

  return html;
}

// ── KEYWORD POPUP ─────────────────────────────────────────────────────────────
function showKw(e,kw){
  const popup=document.getElementById('kwPopup');
  document.getElementById('kwName').textContent=kw;
  document.getElementById('kwText').textContent=KEYWORDS[kw]||'';
  popup.classList.add('visible');
  // Position near click
  const x=e.clientX,y=e.clientY;
  const pw=240,ph=popup.offsetHeight||120;
  const left=Math.min(x+10,window.innerWidth-pw-10);
  const top=y+ph+20>window.innerHeight?y-ph-10:y+10;
  popup.style.left=left+'px';popup.style.top=top+'px';
  e.stopPropagation();
}
document.addEventListener('click',()=>{
  document.getElementById('kwPopup').classList.remove('visible');
});

// ── RENDER GRID ───────────────────────────────────────────────────────────────
function typeIcon(typ,sub){
  if(sub==='Verteidigung')return'🛡️';if(sub==='Taktik')return'⚔️';
  if(sub==='Wirtschaft')return'🏪';if(typ==='Gebäude')return'🏰';
  if(typ==='Aktion')return'🃏';return'📜';
}

function renderGrid(cards){
  const grid=document.getElementById('cardGrid');
  if(!cards.length){
    grid.innerHTML='<div class="status"><div class="status-icon">🃏</div><div class="status-text">Keine Karten gefunden</div></div>';
    return;
  }
  grid.innerHTML=cards.map((card,idx)=>{
    const folder=IMAGE_FOLDERS[card.typ]||BASE;
    const imgSrc=folder+encodeURIComponent(card.name)+'.png';
    const bpills=card.costs.map(k=>{const i=COST_DEF[k]||{label:k,cls:'pill-flex'};return`<span class="cost-pill ${i.cls}">${iconImg(k,9)} ${i.label}</span>`;}).join('');
    const fullType=[card.typ,card.subtyp,card.gebiet].filter(Boolean).join(' — ');
    const statsHTML=(card.angriff||card.abwehr)?`<div class="back-stats">${card.angriff?`<div class="back-stat">⚔️ <span>Angriff</span> ${card.angriff}</div>`:''} ${card.abwehr?`<div class="back-stat">🛡️ <span>Abwehr</span> ${card.abwehr}</div>`:''}</div>`:'';

    return`<div class="card-wrap" id="cw${idx}" onclick="toggleFlip(${idx})">
      <div class="card-aspect">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-art">
              <img class="artwork" src="${imgSrc}" alt="${card.name}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <div class="ph" style="display:none"><span>${typeIcon(card.typ,card.subtyp)}</span><span class="ph-label">${card.name}</span></div>
            </div>
          </div>
          <div class="card-back">
            <div class="back-name">${card.name}</div>
            <div class="back-typeline">${fullType}${card.spielstein?` · <em style="color:var(--gold-dim)">${card.spielstein}</em>`:''}</div>
            ${statsHTML}
            <div class="back-text">${formatText(card.rawText)}</div>
            ${card.costs.length?`<div class="back-costs">${bpills}</div>`:''}
            <div class="back-footer">
              ${card.wert?`<div class="back-wert">★ Wert ${card.wert}</div>`:'<span></span>'}
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// Tap-to-flip: tap flips, tap again unflips
// On desktop hover handles it via CSS, click just stops propagation to keep popup working
function toggleFlip(idx){
  const el=document.getElementById('cw'+idx);
  if(!el)return;
  el.classList.toggle('flipped');
}
</script>
