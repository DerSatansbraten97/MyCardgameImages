<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KERN — Kartenshop</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0b07;--surface:#1a1510;--surface2:#241d14;--border:#3a2f1e;
    --gold:#c9923a;--gold-dim:#7a5520;--gold-glow:#e8b060;
    --text:#e8dcc8;--text-dim:#8a7a60;--text-muted:#504030;--radius:6px;
    --col-holz:#8faa5a;--col-eisen:#7a9bb5;--col-nahrung:#c9a83a;
    --col-stein:#9a8a7a;--col-geld:#c9923a;--col-flex:#a07ab5;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* HEADER */
  header{background:linear-gradient(180deg,#1a1208 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:.7rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:100;}
  .logo{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:700;color:var(--gold);letter-spacing:.15em;text-shadow:0 0 20px rgba(201,146,58,.4);flex-shrink:0;}
  .logo span{color:var(--text-dim);font-weight:400;font-size:.62rem;letter-spacing:.3em;display:block;margin-top:-2px;}
  .search-wrap{flex:1;max-width:280px;margin-left:auto;position:relative;}
  .search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.4rem .9rem .4rem 1.9rem;color:var(--text);font-family:'Inter',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s;}
  .search-wrap input:focus{border-color:var(--gold-dim);}
  .search-wrap input::placeholder{color:var(--text-muted);}
  .search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:.82rem;}
  .card-count{color:var(--text-dim);font-size:.72rem;white-space:nowrap;}

  /* TYPE TAB BAR */
  .type-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:.4rem 1rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;}
  .type-tab{padding:.25rem .65rem;border-radius:4px;font-size:.7rem;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:.3rem;}
  .type-tab:hover{border-color:var(--gold-dim);color:var(--text);}
  .type-tab.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-glow);}
  .type-tab img{width:13px;height:13px;object-fit:contain;}
  .type-all{font-weight:600;}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 86px);}

  /* SIDEBAR */
  aside{background:var(--surface);border-right:1px solid var(--border);padding:.85rem;position:sticky;top:86px;height:calc(100vh - 86px);overflow-y:auto;display:flex;flex-direction:column;gap:.05rem;}
  aside::-webkit-scrollbar{width:3px;}
  aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .filter-section{margin-bottom:.85rem;}
  .filter-label{font-family:'Cinzel',serif;font-size:.54rem;font-weight:600;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.38rem;display:block;}
  .filter-chips{display:flex;flex-wrap:wrap;gap:.22rem;}
  .chip{padding:.22rem .52rem;border-radius:4px;font-size:.66rem;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;line-height:1.4;display:inline-flex;align-items:center;gap:.22rem;}
  .chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .chip.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-glow);}
  .chip img{width:12px;height:12px;object-fit:contain;}

  /* BUY PANEL */
  .buy-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem;margin-bottom:.85rem;}
  .buy-rows{display:flex;flex-direction:column;gap:.28rem;margin-bottom:.4rem;}
  .buy-row{display:flex;align-items:center;gap:.45rem;}
  .buy-label{display:flex;align-items:center;gap:.28rem;font-size:.65rem;color:var(--text-dim);width:80px;flex-shrink:0;}
  .buy-label img{width:14px;height:14px;object-fit:contain;}
  .stepper{display:flex;align-items:center;border:1px solid var(--border);border-radius:4px;overflow:hidden;flex:1;}
  .stepper-btn{background:var(--surface);border:none;color:var(--text-dim);font-size:.95rem;width:26px;height:24px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600;}
  .stepper-btn:hover{background:var(--gold-dim);color:var(--gold-glow);}
  .stepper-val{flex:1;background:var(--bg);color:var(--text);font-size:.78rem;font-weight:600;text-align:center;height:24px;line-height:24px;font-family:'Cinzel',serif;}
  .buy-toggle{width:100%;padding:.32rem;background:var(--gold-dim);border:1px solid var(--gold);border-radius:4px;color:var(--gold-glow);font-size:.68rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;text-align:center;}
  .buy-toggle:hover{background:var(--gold);color:#000;}
  .buy-toggle.active{background:var(--gold);color:#000;font-weight:600;}
  .buy-clear{width:100%;padding:.22rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-size:.62rem;cursor:pointer;font-family:'Inter',sans-serif;margin-top:.28rem;}
  .buy-clear:hover{border-color:var(--gold-dim);color:var(--text-dim);}
  .buy-note{font-size:.58rem;color:var(--text-muted);text-align:center;margin-top:.25rem;font-style:italic;}

  .reset-btn{width:100%;padding:.38rem;background:transparent;border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:.65rem;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;margin-top:auto;}
  .reset-btn:hover{border-color:var(--gold-dim);color:var(--text-dim);}

  /* SORT BAR */
  .sort-bar{display:flex;align-items:center;gap:.3rem;padding:.45rem .9rem;border-bottom:1px solid var(--border);background:var(--surface);flex-wrap:wrap;}
  .sort-label{font-size:.65rem;color:var(--text-muted);}
  .sort-btn{padding:.22rem .55rem;border-radius:4px;font-size:.65rem;border:1px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:.18rem;}
  .sort-btn:hover{color:var(--text);}
  .sort-btn.active{border-color:var(--border);background:var(--surface2);color:var(--gold);}
  .sort-arrow{font-size:.58rem;opacity:.7;}

  /* MAIN */
  main{display:flex;flex-direction:column;}
  .grid-area{padding:.85rem;flex:1;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:.8rem;}

  /* CARD */
  .card-wrap{perspective:900px;cursor:pointer;height:230px;}
  .card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s cubic-bezier(.4,0,.2,1);border-radius:var(--radius);}
  .card-wrap:hover .card-inner,.card-wrap.flipped .card-inner{transform:rotateY(180deg);}
  .card-front,.card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);overflow:hidden;}
  .card-front{border:1px solid var(--border);}
  .card-back{transform:rotateY(180deg);background:var(--surface);border:1px solid var(--gold-dim);display:flex;flex-direction:column;padding:.62rem;}

  /* FRONT = bild only, typ-farbiger rand */
  .card-art{width:100%;height:100%;position:relative;}
  .card-art img.artwork{width:100%;height:100%;object-fit:cover;object-position:top;display:block;border-radius:var(--radius);}
  .ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;font-size:2rem;opacity:.2;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);border-radius:var(--radius);}
  .ph-label{font-family:'Cinzel',serif;font-size:.55rem;opacity:.6;}

  /* BACK */
  .back-name{font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;color:var(--gold);margin-bottom:.12rem;border-bottom:1px solid var(--border);padding-bottom:.25rem;flex-shrink:0;}
  .back-typeline{font-size:.54rem;color:var(--text-muted);margin-bottom:.3rem;flex-shrink:0;line-height:1.35;}
  .back-stats{display:flex;gap:.4rem;margin-bottom:.3rem;flex-shrink:0;}
  .back-stat{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.15rem .4rem;font-size:.6rem;display:flex;align-items:center;gap:.2rem;font-family:'Cinzel',serif;}
  .back-stat span{color:var(--text-muted);font-size:.52rem;font-family:'Inter',sans-serif;}
  .back-text{font-size:.6rem;color:var(--text-dim);line-height:1.55;flex:1;overflow-y:auto;min-height:0;}
  .back-text::-webkit-scrollbar{width:2px;}
  .back-text::-webkit-scrollbar-thumb{background:var(--border);border-radius:1px;}
  .back-divider{color:var(--border);font-size:.42rem;display:block;text-align:center;margin:.15rem 0;}
  .tok img{width:12px;height:12px;object-fit:contain;vertical-align:middle;}
  .back-costs{margin-top:.28rem;padding-top:.25rem;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:2px;flex-shrink:0;}
  .cost-pill{font-size:.5rem;font-weight:600;padding:1px 4px;border-radius:3px;line-height:1.4;display:inline-flex;align-items:center;gap:2px;}
  .cost-pill img{width:10px;height:10px;object-fit:contain;}
  .pill-geld   {background:rgba(201,146,58,.2); color:var(--col-geld);   border:1px solid rgba(201,146,58,.35);}
  .pill-eisen  {background:rgba(122,155,181,.2);color:var(--col-eisen);  border:1px solid rgba(122,155,181,.35);}
  .pill-holz   {background:rgba(143,170,90,.2); color:var(--col-holz);   border:1px solid rgba(143,170,90,.35);}
  .pill-nahrung{background:rgba(201,168,58,.2); color:var(--col-nahrung);border:1px solid rgba(201,168,58,.35);}
  .pill-stein  {background:rgba(154,138,122,.2);color:var(--col-stein);  border:1px solid rgba(154,138,122,.35);}
  .pill-flex   {background:rgba(160,122,181,.2);color:var(--col-flex);   border:1px solid rgba(160,122,181,.35);}
  .back-footer{display:flex;justify-content:space-between;align-items:center;margin-top:.25rem;padding-top:.25rem;border-top:1px solid var(--border);flex-shrink:0;}
  .back-wert{font-size:.56rem;color:var(--gold);font-family:'Cinzel',serif;}

  /* STATUS */
  .status{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text-muted);}
  .status-icon{font-size:2.5rem;margin-bottom:.8rem;opacity:.25;}
  .status-text{font-family:'Cinzel',serif;font-size:.82rem;letter-spacing:.1em;}
  .status small{display:block;margin-top:.5rem;font-family:'Inter',sans-serif;font-size:.7rem;letter-spacing:0;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .8rem;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:700px){
    .layout{grid-template-columns:1fr;}
    aside{position:static;height:auto;max-height:280px;border-right:none;border-bottom:1px solid var(--border);}
    .card-grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr));}
    .card-wrap{height:190px;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">KERN<span>Kartenshop</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Karte suchen…" oninput="applyFilters()">
  </div>
  <div class="card-count" id="cardCount">Lädt…</div>
</header>

<!-- TYP-TABS oben -->
<div class="type-bar" id="typeBar"></div>

<div class="layout">
<aside>
  <!-- KAUFEN -->
  <div class="buy-panel">
    <span class="filter-label">💰 Was kann ich kaufen?</span>
    <div class="buy-rows" id="buyRows"></div>
    <button class="buy-toggle" id="buyToggle" onclick="toggleBuyMode()">Filter aktivieren</button>
    <button class="buy-clear" onclick="clearBuy()">Zurücksetzen</button>
    <div class="buy-note">Ereigniskarten sind nicht kaufbar</div>
  </div>

  <div class="filter-section">
    <span class="filter-label">Subtyp</span>
    <div class="filter-chips" id="filterSubtyp"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Gebiet</span>
    <div class="filter-chips" id="filterGebiet"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Spielstein</span>
    <div class="filter-chips" id="filterSpielstein"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Kosten (enthält)</span>
    <div class="filter-chips" id="filterKosten"></div>
  </div>
  <div class="filter-section">
    <span class="filter-label">Wert</span>
    <div class="filter-chips" id="filterWert"></div>
  </div>
  <button class="reset-btn" onclick="resetAll()">✕ Alle Filter zurücksetzen</button>
</aside>

<main>
  <div class="sort-bar">
    <span class="sort-label">Sortierung:</span>
    <button class="sort-btn active" data-sort="name"  onclick="setSort(this)"><span>Name</span><span class="sort-arrow" id="arr-name">↑</span></button>
    <button class="sort-btn"        data-sort="wert"  onclick="setSort(this)"><span>Wert</span><span class="sort-arrow" id="arr-wert"></span></button>
    <button class="sort-btn"        data-sort="cost"  onclick="setSort(this)"><span>Kosten</span><span class="sort-arrow" id="arr-cost"></span></button>
    <button class="sort-btn"        data-sort="type"  onclick="setSort(this)"><span>Typ</span><span class="sort-arrow" id="arr-type"></span></button>
  </div>
  <div class="grid-area">
    <div class="card-grid" id="cardGrid">
      <div class="status"><div class="spinner"></div><div class="status-text">Karten werden geladen…</div></div>
    </div>
  </div>
</main>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const BASE = "https://dersatansbraten97.github.io/MyCardgameImages/";
const ICON_BASE = BASE + "Icons/";
const CSV_BASE  = BASE + "CSV/";

// Bildordner je Typ
const IMAGE_FOLDERS = {
  "Gebäude":    BASE + "Gebäudekarten_Images/",
  "Einheit":    BASE + "Einheitenkarten_Images/",
  "Aktion":     BASE + "Aktionskarten_Images/",
  "Ressource":  BASE + "Ressourcenkarten_Images/",
  "Spielstein": BASE + "Spielsteine_Images/",
  // Ereignis: Unterordner Ressource/Aktion je nach Typbox, gleicher Ordner
};
function getImageFolder(card) {
  if(card.typ === 'Spielstein') return BASE + "Spielsteine_Images/";
  if(card.typ === 'Einheit')    return BASE + "Einheitenkarten_Images/";
  if(card.typ === 'Aktion')     return BASE + "Aktionskarten_Images/";
  if(card.typ === 'Gebäude')    return BASE + "Gebäudekarten_Images/";
  if(card.subtyp === 'Ereignis') return BASE + "Ereigniskarten_Images/";
  if(card.typ === 'Ressource')  return BASE + "Ressourcenkarten_Images/";
  return BASE;
}

// CSV-Dateien
const CSV_FILES = [
  { file: "Gebäudekarten - Tabellenblatt1.csv",    typ: "Gebäude",    costCol:"Costs",  hasCost:true  },
  { file: "Einheitenkarten - Tabellenblatt1.csv",  typ: "Einheit",    costCol:"Kosten", hasCost:true  },
  { file: "Aktionskarten - Tabellenblatt1.csv",    typ: "Aktion",     costCol:"Costs",  hasCost:true  },
  { file: "Ressourcenkarten - Tabellenblatt1.csv", typ: "Ressource",  costCol:"Costs",  hasCost:true  },
  { file: "Ereigniskarten - Tabellenblatt1.csv",   typ: "Ereignis",   costCol:null,     hasCost:false },
  { file: "Spielsteine - Tabellenblatt1.csv",      typ: "Spielstein", costCol:"Costs",  hasCost:true  },
];

const COLOR_MAP = {
  HolzCol:{label:"Holz",color:"#8faa5a"},EisenCol:{label:"Eisen",color:"#7a9bb5"},
  NahrungCol:{label:"Nahrung",color:"#c9a83a"},SteinCol:{label:"Stein",color:"#9a8a7a"},
  GeldCol:{label:"Geld",color:"#c9923a"},GenericCol:{label:"Neutral",color:"#888"},
};
const COST_DEF = {
  GeldCost:   {label:"Geld",   cls:"pill-geld",   res:"geld"},
  EisenCost:  {label:"Eisen",  cls:"pill-eisen",  res:"eisen"},
  HolzCost:   {label:"Holz",   cls:"pill-holz",   res:"holz"},
  NahrungCost:{label:"Nahrung",cls:"pill-nahrung",res:"nahrung"},
  SteinCost:  {label:"Stein",  cls:"pill-stein",  res:"stein"},
  FlexCost:   {label:"Flex",   cls:"pill-flex",   res:"flex"},
};
const TEXT_TOKENS = ["Activated","Trigger","Unterbrechung","Rohstoff","Geld","Eisen","Holz","Nahrung","Stein","Flex","GeldCost","EisenCost","HolzCost","NahrungCost","SteinCost","FlexCost"];
const BUY_RES = [
  {id:"geld",label:"Geld",token:"Geld"},{id:"holz",label:"Holz",token:"Holz"},
  {id:"eisen",label:"Eisen",token:"Eisen"},{id:"nahrung",label:"Nahrung",token:"Nahrung"},
  {id:"stein",label:"Stein",token:"Stein"},
];
const TYPE_ICONS = {
  "Gebäude":"🏰","Einheit":"⚔️","Aktion":"🃏","Ressource":"💎","Ereignis":"🎲","Spielstein":"🔷",
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let ALL_CARDS=[], activeTypTab="Alle";
let activeSubtyp=new Set(),activeGebiet=new Set(),activeSpielstein=new Set();
let activeKosten=new Set(),activeWert=new Set();
let currentSort="name",sortAsc=true,buyModeActive=false;
const buyVals={geld:0,holz:0,eisen:0,nahrung:0,stein:0};

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.onload=()=>{buildBuyRows();loadAllCSVs();};

function iconUrl(tok){return ICON_BASE+encodeURIComponent('{'+tok+'}')+ '.png';}
function iconImg(tok,size=12){return `<img src="${iconUrl(tok)}" width="${size}" height="${size}" style="object-fit:contain;vertical-align:middle" alt="${tok}" onerror="this.style.display='none'">`;}

// ── BUY STEPPER ───────────────────────────────────────────────────────────────
function buildBuyRows(){
  document.getElementById('buyRows').innerHTML=BUY_RES.map(r=>`
    <div class="buy-row">
      <div class="buy-label">${iconImg(r.token,14)}<span>${r.label}</span></div>
      <div class="stepper">
        <button class="stepper-btn" onclick="stepBuy('${r.id}',-1)">−</button>
        <div class="stepper-val" id="buyval-${r.id}">0</div>
        <button class="stepper-btn" onclick="stepBuy('${r.id}',1)">+</button>
      </div>
    </div>`).join('');
}
function stepBuy(id,d){buyVals[id]=Math.max(0,(buyVals[id]||0)+d);document.getElementById('buyval-'+id).textContent=buyVals[id];if(buyModeActive)applyFilters();}
function clearBuy(){BUY_RES.forEach(r=>{buyVals[r.id]=0;const e=document.getElementById('buyval-'+r.id);if(e)e.textContent='0';});if(buyModeActive){buyModeActive=false;syncBuyBtn();}applyFilters();}
function syncBuyBtn(){const b=document.getElementById('buyToggle');b.classList.toggle('active',buyModeActive);b.textContent=buyModeActive?'Filter aktiv ✓':'Filter aktivieren';}
function toggleBuyMode(){buyModeActive=!buyModeActive;syncBuyBtn();applyFilters();}

// ── CSV LOADING ───────────────────────────────────────────────────────────────
async function loadAllCSVs(){
  document.getElementById('cardGrid').innerHTML='<div class="status"><div class="spinner"></div><div class="status-text">Karten werden geladen…</div></div>';
  const results=await Promise.allSettled(CSV_FILES.map(async def=>{
    const url=CSV_BASE+encodeURIComponent(def.file);
    const res=await fetch(url);
    if(!res.ok) throw new Error(`${def.file}: HTTP ${res.status}`);
    const text=await res.text();
    return parseCSV(text,def);
  }));
  ALL_CARDS=[];
  results.forEach((r,i)=>{
    if(r.status==='fulfilled') ALL_CARDS.push(...r.value);
    else console.warn('CSV Fehler:',CSV_FILES[i].file,r.reason);
  });
  if(!ALL_CARDS.length){
    document.getElementById('cardGrid').innerHTML='<div class="status"><div class="status-icon">⚠️</div><div class="status-text">Keine Karten geladen<small>Prüfe ob die CSV-Dateien im Ordner /CSV/ liegen</small></div></div>';
    return;
  }
  buildTypTabs();buildFilters();applyFilters();
}

// ── CSV PARSER ────────────────────────────────────────────────────────────────
function parseCSVLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){res.push(cur);cur='';}else cur+=c;}
  res.push(cur);return res;
}
function splitCSVRows(text){
  const rows=[];let cur='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){if(inQ&&text[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;cur+=c;}
    else if((c==='\r'||c==='\n')&&!inQ){if(c==='\r'&&text[i+1]==='\n')i++;if(cur.trim())rows.push(cur);cur='';}
    else cur+=c;
  }
  if(cur.trim())rows.push(cur);return rows;
}

function parseCosts(raw){
  if(!raw)return[];
  const costs=[],mp=new Set();let m;
  const mre=/(\d+)\{(\w+Cost)\}/g;
  while((m=mre.exec(raw))!==null){for(let n=0;n<parseInt(m[1]);n++)costs.push(m[2]);for(let p=m.index;p<m.index+m[0].length;p++)mp.add(p);}
  const sre=/\{(\w+Cost)\}/g;
  while((m=sre.exec(raw))!==null){if(!mp.has(m.index))costs.push(m[1]);}
  return costs;
}

// Spielstein-Name aus Typbox extrahieren: "Einheit - Infanterie - 2 Fußsoldaten" → "Fußsoldat"
// Entfernt führende Zahl und macht Plural rückgängig (einfach: entferne trailing 'en','n','e')
function extractSpielstein(typStr){
  const parts=typStr.split(' - ');
  if(parts.length<3)return'';
  let raw=parts[2].trim();
  // Entferne führende Zahl: "2 Fußsoldaten" → "Fußsoldaten"
  raw=raw.replace(/^\d+\s+/,'');
  // Normalisiere Plural → Singular (einfache Heuristik)
  // "Fußsoldaten" → "Fußsoldat", "Bogenschützen" → "Bogenschütze", "Reiter" bleibt
  raw=raw.replace(/soldaten$/i,'soldat').replace(/schützen$/i,'schütze')
         .replace(/ritter$/i,'Ritter').replace(/soldaten$/i,'soldat');
  return raw;
}

function parseCSV(text,def){
  const rows=splitCSVRows(text);
  if(rows.length<2)return[];
  const h=parseCSVLine(rows[0]).map(x=>x.replace(/^"|"$/g,'').trim());
  const col=n=>{const i=h.indexOf(n);return i>=0?i:null;};

  const iName=col('Name'),iType=col('Typbox');
  const iCosts=def.costCol?col(def.costCol):null;
  const iText=col('Textbox'),iWert=col('Wert');
  const iAngriff=col('Angriffskraft'),iAbwehr=col('Abwehrkraft');
  const iHex=col('Hexagon_Color style'),i2Col=col('2Color style');

  // Artwork-Spalte
  const iArt=col('Artwork');

  return rows.slice(1).map(row=>{
    const r=parseCSVLine(row).map(v=>v.replace(/^"|"$/g,'').trim());
    const name=r[iName]||'';if(!name)return null;

    const typeRaw=iType!==null?r[iType]||'':'';
    const typeParts=typeRaw.split(' - ').map(p=>p.trim()).filter(Boolean);

    // Für Ereignis: Typ aus Typbox lesen (z.B. "Ressource - Ereignis" → subtyp=Ereignis)
    let typ=def.typ;
    let subtyp=typeParts[1]||'';
    let gebiet=typeParts[2]||'';

    // Spielstein-Name (für Einheiten)
    const spielstein=def.typ==='Einheit'?extractSpielstein(typeRaw):'';

    const costs=iCosts!==null?parseCosts(r[iCosts]):[];
    const craw=(iHex!==null?r[iHex]||'':'')+' '+(i2Col!==null?r[i2Col]||'':'');
    const cm=craw.match(/\{(\w+Col)\}/);

    // Artwork-Dateiname (erstes Segment vor Komma)
    let artFile='';
    if(iArt!==null&&r[iArt]){
      artFile=r[iArt].split(',')[0].trim();
      // Entferne Pfad-Präfixe die Dextrous manchmal hinzufügt
      artFile=artFile.replace(/^Artworks\/Actions\//i,'').replace(/^Artworks\//i,'');
    }

    return{
      name,typ,subtyp,gebiet,spielstein,costs,
      rawText:(iText!==null?r[iText]||'':'').replace(/\r/g,''),
      wert:parseFloat(iWert!==null?r[iWert]||'0':'0')||0,
      color:cm?cm[1]:'',
      hasCost:def.hasCost,
      artFile,
      angriff:iAngriff!==null?r[iAngriff]||'':'',
      abwehr: iAbwehr!==null?r[iAbwehr]||'':'',
    };
  }).filter(Boolean);
}

// ── TYPE TABS ─────────────────────────────────────────────────────────────────
function buildTypTabs(){
  const typen=['Alle',...new Set(ALL_CARDS.map(c=>c.typ))];
  const bar=document.getElementById('typeBar');bar.innerHTML='';
  typen.forEach(t=>{
    const b=document.createElement('button');
    b.className='type-tab'+(t==='Alle'?' type-all':'')+(t===activeTypTab?' active':'');
    b.dataset.typ=t;
    if(t==='Alle') b.textContent='Alle';
    else b.innerHTML=`${TYPE_ICONS[t]||'📜'} ${t}`;
    b.onclick=()=>{activeTypTab=t;document.querySelectorAll('.type-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');applyFilters();};
    bar.appendChild(b);
  });
}

// ── SIDEBAR FILTERS ───────────────────────────────────────────────────────────
function buildFilters(){
  const visible=()=>activeTypTab==='Alle'?ALL_CARDS:ALL_CARDS.filter(c=>c.typ===activeTypTab);
  const uniq=arr=>[...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'de'));

  buildChips('filterSubtyp',   uniq(ALL_CARDS.map(c=>c.subtyp)),    activeSubtyp,    applyFilters);
  buildChips('filterGebiet',   uniq(ALL_CARDS.map(c=>c.gebiet)),    activeGebiet,    applyFilters);
  buildChips('filterSpielstein',uniq(ALL_CARDS.filter(c=>c.spielstein).map(c=>c.spielstein)), activeSpielstein, applyFilters);

  const usedCosts=[...new Set(ALL_CARDS.flatMap(c=>c.costs))].filter(k=>COST_DEF[k]);
  const cf=document.getElementById('filterKosten');cf.innerHTML='';
  usedCosts.forEach(k=>{const i=COST_DEF[k];const b=document.createElement('button');b.className='chip';b.dataset.key=k;b.innerHTML=`${iconImg(k,12)}<span>${i.label}</span>`;b.onclick=()=>toggleF(b,activeKosten,k,applyFilters);cf.appendChild(b);});

  const werts=[...new Set(ALL_CARDS.map(c=>c.wert).filter(v=>v>0))].sort((a,b)=>a-b);
  const wf=document.getElementById('filterWert');wf.innerHTML='';
  werts.forEach(w=>{const b=mkChip(`★ ${w}`);b.dataset.key=w;b.onclick=()=>toggleF(b,activeWert,w,applyFilters);wf.appendChild(b);});
}

function buildChips(id,vals,set,cb){const el=document.getElementById(id);el.innerHTML='';vals.forEach(v=>{const b=mkChip(v);b.dataset.key=v;b.onclick=()=>toggleF(b,set,v,cb);el.appendChild(b);});}
function mkChip(l){const b=document.createElement('button');b.className='chip';b.textContent=l;return b;}
function toggleF(btn,set,val,cb){set.has(val)?(set.delete(val),btn.classList.remove('active')):(set.add(val),btn.classList.add('active'));cb();}
function resetAll(){
  activeSubtyp.clear();activeGebiet.clear();activeSpielstein.clear();activeKosten.clear();activeWert.clear();
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  document.getElementById('searchInput').value='';
  activeTypTab='Alle';document.querySelectorAll('.type-tab').forEach(b=>b.classList.toggle('active',b.dataset.typ==='Alle'));
  clearBuy();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function setSort(btn){
  const key=btn.dataset.sort;
  if(currentSort===key){sortAsc=!sortAsc;}else{currentSort=key;sortAsc=true;}
  document.querySelectorAll('.sort-btn').forEach(b=>{b.classList.remove('active');const a=document.getElementById('arr-'+b.dataset.sort);if(a)a.textContent='';});
  btn.classList.add('active');const a=document.getElementById('arr-'+key);if(a)a.textContent=sortAsc?'↑':'↓';
  applyFilters();
}

// ── SEARCH ────────────────────────────────────────────────────────────────────
function searchMatch(c,q){
  if(!q)return true;const ql=q.toLowerCase();
  if(c.name.toLowerCase().includes(ql))return true;
  if(c.rawText.toLowerCase().replace(/[{}]/g,'').includes(ql))return true;
  if(c.spielstein&&c.spielstein.toLowerCase().includes(ql))return true;
  return false;
}

// ── AFFORD ────────────────────────────────────────────────────────────────────
function canAfford(card){
  if(!card.hasCost)return false;
  let g=buyVals.geld,h=buyVals.holz,e=buyVals.eisen,n=buyVals.nahrung,s=buyVals.stein;
  for(const k of card.costs){
    if(k==='GeldCost'){if(--g<0)return false;}
    else if(k==='HolzCost'){if(--h<0)return false;}
    else if(k==='EisenCost'){if(--e<0)return false;}
    else if(k==='NahrungCost'){if(--n<0)return false;}
    else if(k==='SteinCost'){if(--s<0)return false;}
  }
  return(h+e+n+s)>=card.costs.filter(k=>k==='FlexCost').length;
}

// ── APPLY ─────────────────────────────────────────────────────────────────────
function applyFilters(){
  const q=document.getElementById('searchInput').value.trim();
  let filtered=ALL_CARDS.filter(c=>{
    if(!searchMatch(c,q))return false;
    if(activeTypTab!=='Alle'&&c.typ!==activeTypTab)return false;
    if(activeSubtyp.size&&!activeSubtyp.has(c.subtyp))return false;
    if(activeGebiet.size&&!activeGebiet.has(c.gebiet))return false;
    if(activeSpielstein.size&&!activeSpielstein.has(c.spielstein))return false;
    if(activeKosten.size&&![...activeKosten].some(k=>c.costs.includes(k)))return false;
    if(activeWert.size&&!activeWert.has(c.wert))return false;
    if(buyModeActive&&!canAfford(c))return false;
    return true;
  });
  const dir=sortAsc?1:-1;
  filtered.sort((a,b)=>{
    if(currentSort==='name')return dir*a.name.localeCompare(b.name,'de');
    if(currentSort==='wert')return dir*(a.wert-b.wert);
    if(currentSort==='cost')return dir*(a.costs.length-b.costs.length);
    if(currentSort==='type')return dir*(a.typ.localeCompare(b.typ,'de')||a.subtyp.localeCompare(b.subtyp,'de'));
    return 0;
  });
  document.getElementById('cardCount').textContent=`${filtered.length} / ${ALL_CARDS.length} Karten`;
  renderGrid(filtered);
}

// ── FORMAT TEXT ───────────────────────────────────────────────────────────────
function formatText(raw){
  return raw
    .replace(/\s*\n\/\n\s*/g,'<span class="back-divider">───────</span>')
    .replace(/\s*\/\n\s*/g,'<span class="back-divider">───────</span>')
    .replace(/\n/g,' ')
    .replace(/\{(\w+)\}/g,(_,tok)=>{
      if(TEXT_TOKENS.includes(tok))return`<span class="tok">${iconImg(tok,12)}</span>`;
      return`<span style="color:var(--text-muted);font-size:.52rem">{${tok}}</span>`;
    });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderGrid(cards){
  const grid=document.getElementById('cardGrid');
  if(!cards.length){grid.innerHTML='<div class="status"><div class="status-icon">🃏</div><div class="status-text">Keine Karten gefunden</div></div>';return;}
  grid.innerHTML=cards.map(card=>{
    const ci=COLOR_MAP[card.color];
    const bpills=card.costs.map(k=>{const i=COST_DEF[k]||{label:k,cls:'pill-flex'};return`<span class="cost-pill ${i.cls}">${iconImg(k,10)} ${i.label}</span>`;}).join('');
    const fullType=[card.typ,card.subtyp,card.gebiet].filter(Boolean).join(' — ');
    const folder = getImageFolder(card);
    const imgSrc = folder + encodeURIComponent(card.name) + '.png';

    // Kampfstats für Einheiten
    const statsHTML=(card.angriff||card.abwehr)?`
      <div class="back-stats">
        ${card.angriff?`<div class="back-stat">⚔️ <span>Angriff</span> ${card.angriff}</div>`:''}
        ${card.abwehr?`<div class="back-stat">🛡️ <span>Abwehr</span> ${card.abwehr}</div>`:''}
      </div>`:'';

    const typIcon=TYPE_ICONS[card.typ]||'📜';

    return`
    <div class="card-wrap" onclick="this.classList.toggle('flipped')">
      <div class="card-inner">
        <div class="card-front">
          <div class="card-art">
            <img class="artwork" src="${imgSrc}" alt="${card.name}"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="ph" style="display:none"><span>${typIcon}</span><span class="ph-label">${card.name}</span></div>
          </div>
        </div>
        <div class="card-back">
          <div class="back-name">${card.name}</div>
          <div class="back-typeline">${ci?`<span style="color:${ci.color}">◆</span> `:''}${fullType}${card.spielstein?` · <em style="color:var(--gold-dim)">${card.spielstein}</em>`:''}</div>
          ${statsHTML}
          <div class="back-text">${formatText(card.rawText)}</div>
          ${card.costs.length?`<div class="back-costs">${bpills}</div>`:''}
          <div class="back-footer">
            ${card.wert?`<div class="back-wert">★ Wert ${card.wert}</div>`:'<span></span>'}
            ${ci?`<span style="font-size:.54rem;color:${ci.color}">${ci.label}</span>`:'<span></span>'}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}
